<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Vennela Reddy Kuruguntla</title>
    <!-- Link to our external CSS file in the static directory -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Import Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Three.js and Vanta.js for 3D AI node effect -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <style>
        .markdown-body {
            background: rgba(14, 17, 23, 0.85);
            padding: 3.5rem;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 1px solid #1f232b;
            color: var(--text-main);
            max-width: 800px;
            margin: 4rem auto;
            line-height: 1.7;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            color: white;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }

        .markdown-body h1 {
            font-size: 2.5rem;
            margin-top: 0;
        }

        .markdown-body h2 {
            font-size: 1.8rem;
        }

        .markdown-body a {
            color: var(--primary-color);
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .markdown-body li {
            margin-bottom: 0.5rem;
        }

        .markdown-body p {
            margin-bottom: 1.5rem;
        }

        .markdown-body code {
            background: #151821;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            color: #F3A333;
        }

        .markdown-body pre {
            background: #151821;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .markdown-body pre code {
            color: #E0E0E0;
            background: transparent;
            padding: 0;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 1rem;
            color: var(--text-muted);
            margin-left: 0;
            margin-bottom: 1.5rem;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid #1f232b;
            padding-bottom: 2rem;
        }

        .blog-date {
            color: var(--primary-color);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- 3D Background Container -->
    <div id="background-wrapper"
        style="position: fixed; z-index: -1; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden;">
        <!-- Vanta JS canvas -->
        <div id="vanta-bg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
        <!-- 3D Parallax Profile Image -->
        <div id="profile-bg"
            style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 110vw; height: 110vh; background-image: url('{{ url_for('static', filename='images/profile.jpg') }}'); background-size: cover; background-position: center; opacity: 0.15; mix-blend-mode: luminosity; transition: transform 0.1s ease-out; pointer-events: none;">
        </div>
    </div>

    <header class="header">
        <div class="logo">
            <a href="/" style="text-decoration: none; color: inherit;">
                <span class="logo-me">Vennela Reddy</span>
                <span class="logo-first">Kuruguntla</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="/#about">About</a>
            <a href="/#projects">Projects</a>
            <a href="/#blog">Blog</a>
        </nav>
    </header>

    <main>
        <article class="markdown-body">
            <div class="blog-header">
                <p class="blog-date">{{ date }}</p>
                <h1 style="margin-top: 0.5rem;">{{ title }}</h1>
            </div>

            {{ content|safe }}

            <div style="margin-top: 4rem; text-align: center; border-top: 1px solid #1f232b; padding-top: 2rem;">
                <a href="/#blog" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">&larr;
                    Back to all posts</a>
            </div>
        </article>
    </main>



    <!-- Initialize Vanta.js 3D effect -->
    <script>
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0xf3a333,      // Primary orange color
            backgroundColor: 0x0e1117, // Dark background
            points: 12.00,
            maxDistance: 22.00,
            spacing: 18.00
        });

        // 3D Parallax Effect for Profile Image
        document.addEventListener('mousemove', (e) => {
            const bg = document.getElementById('profile-bg');
            if (bg) {
                // Calculate movement (subtle shift opposite to mouse)
                const x = (window.innerWidth / 2 - e.pageX) / 45;
                const y = (window.innerHeight / 2 - e.pageY) / 45;

                // Keep the -50% -50% centering, add the dynamic x/y shift
                bg.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1.05)`;
            }
        });
    </script>
</body>

</html>
